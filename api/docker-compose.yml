# Exemplo: API BibliaReader + PostgreSQL (não mistura com MySQL do outro projeto).
# Uso: copie .env.example para .env, ajuste senhas e: docker compose up -d
#
# Migrações EF: rode uma vez após subir o Postgres (na sua máquina ou na VPS):
#   dotnet ef database update --project src/BibliaReader.Infrastructure --startup-project src/BibliaReader.Api
#   (ConnectionString apontando para o Postgres do servidor / túnel SSH)

services:
  postgres:
    image: postgres:16-alpine
    container_name: bibliareader-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-bibliareader}
    volumes:
      - bibliareader_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: bibliareader-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Host 127.0.0.1 apenas — Nginx na VPS faz proxy para cá
      - "127.0.0.1:${API_HOST_PORT:-5001}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-bibliareader};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?defina JWT_KEY com 32+ caracteres}
      Jwt__Issuer: ${JWT_ISSUER:-BibliaReader}
      Jwt__Audience: ${JWT_AUDIENCE:-BibliaReaderApp}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-120}

volumes:
  bibliareader_pgdata:
